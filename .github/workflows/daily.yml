name: daily dilemma

on:
  schedule:
    - cron: "7 6 * * *" # 06:07 UTC every day
  workflow_dispatch: {} # and on demand

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # runs TypeScript directly, no build step
      - name: Render today's dilemma
        run: node scripts/gallery.ts
      - name: Commit the new frame
        run: |
          git config user.name "switchyard-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery
          if git diff --staged --quiet; then
            echo "no change today"
          else
            git commit -m "gallery: $(date -u +%Y-%m-%d) dilemma"
            git push
          fi
